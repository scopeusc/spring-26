kind: Deployment
apiVersion: apps/v1
metadata:
  name: go-app-deployment
spec:
  replicas: 12
  selector:
    matchLabels:
      app: go-app
  template:
    metadata:
      labels:
        app: go-app
    spec:
      containers:
        - name: go-app
          image: curriculum-rocks
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
---
kind: Service
apiVersion: v1
metadata:
  name: go-app-service
spec:
  selector:
    app: go-app
  ports:
    - port: 8080
      targetPort: 8080